<div class="card shadow-sm mb-3 expense-item">
    <div class="card-header d-flex justify-content-between align-items-center">
        <strong>
            {% if item.item_type.name == "REPAS" %}
                🍽 Repas
            {% elif item.item_type.name == "FOURNITURE" %}
                🛒 Fournitures
            {% elif item.item_type.name == "HOTEL" %}
                🏨 Hôtel
            {% elif item.item_type.name == "OTHER" %}
                📦 Autre
            {% else %}
                Dépense
            {% endif %}
        </strong>

        <button
            type="button"
            class="btn btn-sm btn-outline-danger delete-item">
            Supprimer
        </button>
    </div>

    <div class="card-body">

        <input
            type="hidden"
            class="item-id"
            value="{{ item.id }}">

        <input
            type="hidden"
            class="item-type"
            value="{{ item.item_type.name }}">

        <div class="mb-3">
            <label class="form-label">
                Description
            </label>

            <input
                type="text"
                class="form-control description"
                value="{{ item.description or '' }}">
        </div>

        <div class="mb-3">
            <label class="form-label">
                Montant
            </label>

            <input
                type="number"
                step="0.01"
                class="form-control amount"
                value="{{ item.amount or 0 }}">
        </div>

        {% include "expenses/components/receipts.html" %}

    </div>
</div>
