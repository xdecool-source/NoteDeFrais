<!-- ===================================================== -->
<!-- TEMPLATE DEPLACEMENT                                  -->
<!-- ===================================================== -->
<template id="travel-template">
    <div class="card shadow-sm mb-3 expense-item">
        <div class="card-header d-flex justify-content-between align-items-center">
            <strong>
                Déplacement
            </strong>
            <button
                type="button"
                class="btn btn-sm btn-outline-danger delete-item">
                Supprimer
            </button>
        </div>
        <div class="card-body">
            <input
                type="hidden"
                class="item-id"
                value="">
            <input
                type="hidden"
                class="item-type"
                value="KM">
            <input
                type="hidden"
                class="km-rate"
                value="{{ km_rate }}">
            <!-- VEHICULE ELECTRIQUE -->
            <div class="form-check mb-3">
                <input
                    type="checkbox"
                    class="form-check-input electric-vehicle">
                <label class="form-check-label">
                    Véhicule électrique (+20 %) - Pas hybride
                </label>
            </div>
            <!-- DEPART / ARRIVEE -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Départ
                    </label>
                    <input
                        type="text"
                        class="form-control departure">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Arrivée
                    </label>
                    <input
                        type="text"
                        class="form-control arrival">
                </div>
            </div>
            <!-- MONTANTS -->
            <div class="row">
                <div class="col-6 col-md-3 mb-3">
                    <label class="form-label">
                        Kilomètres
                    </label>
                    <input
                        type="number"
                        step="0.1"
                        value="0"
                        class="form-control kilometers">
                </div>
                <div class="col-6 col-md-3 mb-3">
                    <label class="form-label">
                        Péage
                    </label>
                    <input
                        type="number"
                        step="0.01"
                        value="0"
                        class="form-control toll-amount">
                </div>
                <div class="col-6 col-md-3 mb-3">
                    <label class="form-label">
                        Divers
                    </label>
                    <input
                        type="number"
                        step="0.01"
                        value="0"
                        class="form-control other-amount">
                </div>
                <div class="col-6 col-md-3 mb-3">
                    <label class="form-label">
                        Montant
                    </label>
                    <input
                        type="number"
                        step="0.01"
                        value="0"
                        class="form-control amount"
                        readonly>
                </div>
            </div>
        </div>
    </div>
</template>
