{% extends "base.html" %}
{% block title %}
Connexion
{% endblock %}
{% block content %}

<h2>Connexion</h2>
{% if error %}
<div style="color:red;">
    {{ error }}
</div>
{% endif %}
<form action="/auth/login" method="post">
        <div>
        <label>Utilisateur</label><br>
        <input
            type="text"
            name="username"
            required
        >
    </div>
    <br>
    <div>
        <label>Mot de passe</label><br>
        <input
            type="password"
            name="password"
            required
        >
    </div>
    <br>
    <button type="submit">
        Se connecter
    </button>
</form>
{% endblock %}
